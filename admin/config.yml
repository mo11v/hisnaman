backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"
locale: "ar"
site_url: "https://hisnaman.com"
display_url: "https://hisnaman.com"
logo_url: "/assets/logo.jpg"

collections:
  - name: "posts"
    label: "مجلة الأسرة"
    folder: "content/posts"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - {label: "العنوان", name: "title", widget: "string"}
      - {label: "الرابط المختصر", name: "slug", widget: "string"}
      - {label: "الصورة", name: "image", widget: "image", required: false}
      - {label: "الوصف المختصر", name: "description", widget: "text", required: false}
      - {label: "تاريخ النشر", name: "date", widget: "datetime", required: false}
      - {label: "المحتوى", name: "body", widget: "markdown"}

  - name: "services"
    label: "الخدمات"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - {label: "اسم الخدمة", name: "title", widget: "string"}
      - {label: "الرابط المختصر", name: "slug", widget: "string"}
      - {label: "الأيقونة", name: "icon", widget: "string", required: false}
      - {label: "الصورة", name: "image", widget: "image", required: false}
      - {label: "وصف مختصر", name: "description", widget: "text"}
      - {label: "تفاصيل الخدمة", name: "body", widget: "markdown"}

  - name: "clients"
    label: "عملاؤنا"
    folder: "content/clients"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    fields:
      - {label: "اسم العميل", name: "title", widget: "string"}
      - {label: "الرابط المختصر", name: "slug", widget: "string"}
      - {label: "نوع المنشأة", name: "category", widget: "string", required: false}
      - {label: "الموقع", name: "location", widget: "string", required: false}
      - {label: "الصورة", name: "image", widget: "image", required: false}
      - {label: "وصف المشروع", name: "body", widget: "markdown"}

  - name: "settings"
    label: "إعدادات الموقع"
    files:
      - name: "general"
        label: "البيانات العامة"
        file: "content/settings.json"
        fields:
          - {label: "اسم الشركة", name: "company_name", widget: "string"}
          - {label: "الهاتف", name: "phone", widget: "string"}
          - {label: "واتساب", name: "whatsapp", widget: "string"}
          - {label: "البريد الإلكتروني", name: "email", widget: "string"}
          - {label: "إنستجرام", name: "instagram", widget: "string", required: false}
          - {label: "لينكدإن", name: "linkedin", widget: "string", required: false}
          - {label: "ثريدز", name: "threads", widget: "string", required: false}
          - {label: "فيسبوك", name: "facebook", widget: "string", required: false}
          - {label: "نبذة مختصرة", name: "about_short", widget: "text", required: false}
